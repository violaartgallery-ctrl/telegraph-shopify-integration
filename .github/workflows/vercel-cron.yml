name: vercel-scheduled-sync

# Free 30-min timer that replaces Netlify scheduled functions. Pings the Vercel
# /ops endpoints (idempotent) — drain Odoo queue, sync shipment status → invoices
# + mark paid, and the collections safety sweep.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run scheduled sync on Vercel
        run: |
          BASE=https://viola-telegraph-integration.vercel.app
          curl -s -m 280 -o /dev/null -w "odoo-queue %{http_code}\n" "$BASE/ops/process-odoo-queue" || true
          curl -s -m 280 -o /dev/null -w "open-shipments %{http_code}\n" "$BASE/ops/sync-open-shipments" || true
          curl -s -m 280 -o /dev/null -w "collections %{http_code}\n" "$BASE/ops/sync-collections" || true
