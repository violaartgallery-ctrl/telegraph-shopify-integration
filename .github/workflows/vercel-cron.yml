name: vercel-scheduled-sync

# Free 30-min timer that replaces Netlify scheduled functions. Pings the Vercel
# /ops endpoints (idempotent) — drain Odoo queue, sync shipment status → invoices
# + mark paid, and the collections safety sweep.
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Drain Meta Delivered outbox
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          set -euo pipefail
          BASE=https://viola-telegraph-integration.vercel.app
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 280 \
            -X POST -H "x-ops-secret: $OPS_SECRET" "$BASE/ops/meta-delivered/drain"

      - name: Process Odoo queue
        if: always()
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 280 \
            -H "x-ops-secret: $OPS_SECRET" \
            "https://viola-telegraph-integration.vercel.app/ops/process-odoo-queue"

      - name: Sync open shipments
        if: always()
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 280 \
            -H "x-ops-secret: $OPS_SECRET" \
            "https://viola-telegraph-integration.vercel.app/ops/sync-open-shipments"

      - name: Sync collection reports
        if: always()
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 280 \
            -H "x-ops-secret: $OPS_SECRET" \
            "https://viola-telegraph-integration.vercel.app/ops/sync-collections"

      - name: Resume interrupted production batches
        if: always()
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 60 \
            -H "x-ops-secret: $OPS_SECRET" \
            "https://viola-telegraph-integration.vercel.app/ops/resume-production-jobs"

      - name: Check production safety layers
        if: always()
        env:
          OPS_SECRET: ${{ secrets.OPS_SECRET }}
        run: |
          test -n "$OPS_SECRET"
          curl --fail-with-body --silent --show-error --max-time 120 \
            -H "x-ops-secret: $OPS_SECRET" \
            "https://viola-telegraph-integration.vercel.app/ops/production-health"
